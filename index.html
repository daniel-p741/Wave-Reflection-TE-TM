<!DOCTYPE html>
<html>

<head>
    <title>Wave Reflection - TE/TM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">

</head>

<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h1 class="title">TE & TM Polarization</h1>
        <div class="slider-container">
            <div class="slider-label-row">
                <label for="incidentAngle">Incident Angle (&theta;<sub>i</sub>)</label>
                <span class="slider-val" id="angleValue">45&deg;</span>
            </div>
            <input type="range" min="0" max="89" step="0.1" value="45" class="slider" id="incidentAngle">
            <div class="tick-marks">
                <span>0&deg;</span>
                <span style="left: 63.26%; position: absolute; transform: translateX(-50%); color: var(--accent);">Brewster (56.3&deg;)</span>
                <span>89&deg;</span>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Reflection TE</div>
                <div class="stat-val te-color" id="rTeValue">-0.38</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Reflection TM</div>
                <div class="stat-val tm-color" id="rTmValue">0.09</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="color-dot te-bg"></span> TE (Transverse Electric)</div>
            <div class="legend-item"><span class="color-dot tm-bg"></span> TM (Transverse Magnetic)</div>
        </div>
    </div>

    <!-- Include three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>
    <script src="wave_reflection_TE_TM.js"></script>
</body>
</html>
