<!DOCTYPE html>
<html>

<head>
    <title>Wave Reflection - TE/TM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">

</head>

<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h1 class="title">TE & TM Polarization</h1>
        <div class="slider-container">
            <div class="slider-label-row">
                <label for="incidentAngle">Incident Angle (&theta;<sub>i</sub>)</label>
                <span class="slider-val" id="angleValue">45&deg;</span>
            </div>
            <input type="range" min="0" max="89" step="0.1" value="45" class="slider" id="incidentAngle">
            <div class="tick-marks" id="angleTickMarks">
                <span>0&deg;</span>
                <span id="brewsterTick" style="left: 63.26%; position: absolute; transform: translateX(-50%); color: var(--accent);">Brewster (56.3&deg;)</span>
                <span>89&deg;</span>
            </div>
        </div>

        <div class="slider-container">
            <div class="slider-label-row">
                <label for="n1Slider">Refractive Index 1 (n<sub>1</sub>)</label>
                <span class="slider-val" id="n1Value">1.00</span>
            </div>
            <input type="range" min="1.0" max="3.0" step="0.01" value="1.0" class="slider" id="n1Slider">
        </div>

        <div class="slider-container">
            <div class="slider-label-row">
                <label for="n2Slider">Refractive Index 2 (n<sub>2</sub>)</label>
                <span class="slider-val" id="n2Value">1.50</span>
            </div>
            <input type="range" min="1.0" max="3.0" step="0.01" value="1.5" class="slider" id="n2Slider">
        </div>

        <div class="slider-container">
            <div class="slider-label-row">
                <label for="lambdaSlider">Wavelength (&lambda;)</label>
                <span class="slider-val" id="lambdaValue">2.5</span>
            </div>
            <input type="range" min="1.0" max="6.0" step="0.1" value="2.5" class="slider" id="lambdaSlider">
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Reflection TE</div>
                <div class="stat-val te-color" id="rTeValue">-0.38</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Reflection TM</div>
                <div class="stat-val tm-color" id="rTmValue">0.09</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="color-dot te-bg"></span> TE (Transverse Electric)</div>
            <div class="legend-item"><span class="color-dot tm-bg"></span> TM (Transverse Magnetic)</div>
        </div>
    </div>

    <div class="ui-panel material-panel">
        <h1 class="title">Surface Material</h1>
        <div class="material-options">
            <label class="radio-label">
                <input type="radio" name="material" value="glass" checked>
                <span>Glass (n=1.52)</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="material" value="water">
                <span>Water (n=1.33)</span>
            </label>
        </div>
    </div>

    <div class="ui-panel camera-panel">
        <h1 class="title">View Options</h1>
        <div class="material-options" style="margin-bottom: 12px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px;">
            <label class="radio-label">
                <input type="radio" name="waveView" value="all" checked>
                <span>Draw TE & TM</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="waveView" value="te">
                <span class="te-color">TE Only (Electric)</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="waveView" value="tm">
                <span class="tm-color">TM Only (Magnetic)</span>
            </label>
        </div>
        <label class="radio-label">
            <input type="checkbox" id="autoRotateToggle">
            <span>Auto Rotate Camera</span>
        </label>
    </div>

    <!-- Include three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>
    <script src="wave_reflection_TE_TM.js"></script>
</body>
</html>
